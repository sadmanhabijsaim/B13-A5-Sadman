<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- custom css -->
    <link rel="stylesheet" href="./style.css">
    <!-- fontawesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body class="bg-[#F8FAFC] min-h-screen">

    <nav class="flex flex-col sm:flex-row items-center justify-between p-4 sm:p-6 bg-[#FFFFFF] shadow-md gap-4 sm:gap-0">
        <div class="flex flex-col sm:flex-row items-center gap-2">
            <img src="./assets/github-logo.png" alt="" class="w-9 h-9">
            <p class="text-xl sm:text-2xl font-semibold">GitHub Issues Tracker</p>
        </div>
        <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
            <label class="input w-full sm:w-auto">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="input-search" type="search" required placeholder="Search issues..." class="w-full" />
            </label>
            <button class="btn btn-primary w-full sm:w-auto">+ New Issue</button>
        </div>
    </nav>

    <section class="">
        <div class="flex flex-wrap items-center justify-start gap-2 sm:gap-4 px-4 sm:px-6 py-4 bg-[#FFFFFF] mt-15 w-10/12 mx-auto rounded-sm shadow-sm ">
            <button id="all-btn" class="btn btn-primary" onclick="loadAll()">All</button>
            <button id="open-btn" class="btn btn-outline btn-ghost btn-primary" onclick="loadOpen()">Open</button>
            <button id="closed-btn" class="btn btn-outline btn-ghost btn-primary" onclick="loadClosed()">Closed</button>
        </div>
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 px-4 sm:px-6 py-4 bg-[#FFFFFF] mt-4 w-10/12 mx-auto rounded-sm shadow-sm">
             <div class=" flex items-center justify-start gap-4 ">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-lg font-semibold"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                </p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
                <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
            </div>
        </div>
    </section>

    <section id="spinner" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>

    <section class="w-10/12 mx-auto bg-[#FBFBFB] rounded-sm shadow-sm px-4 sm:px-6 py-4 mt-[5px]">
        <div id="card-container" class='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4'></div>
    </section>

    <div id="word_modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;"
        onclick="closeModal()">
        <div id="details-container"
            style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:10px; max-width:600px; width:90%;"
            onclick="event.stopPropagation()">
        </div>
    </div>

    <script src="./home-script.js"></script>
</body>

</html>
